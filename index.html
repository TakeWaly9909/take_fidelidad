<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Take Away — Iniciar sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://script.google.com">
<style>
  :root{--bg:#fff; --bg-dark:#8f7248; --card:#f6efdf; --navy:#1e3450; --gold:#d3a24a; --white:#fffaf0;}
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center;
       padding:16px; font-family:'Quicksand',sans-serif; -webkit-tap-highlight-color:transparent;}
  .card{width:100%; max-width:380px; background:var(--card); border-radius:32px; overflow:hidden;
        box-shadow:0 25px 50px -18px rgba(0,0,0,.5);}
  .header{padding:32px 24px 28px; text-align:center; position:relative; overflow:hidden;
    background:
      radial-gradient(circle 110px at 15% -25px, #9e8260 85px, transparent 85px),
      radial-gradient(circle 70px at 88% -15px, #9e8260 55px, transparent 55px),
      radial-gradient(circle 60px at 12% 105%, #9e8260 45px, transparent 45px),
      radial-gradient(circle 80px at 80% 108%, #9e8260 62px, transparent 62px),
      var(--bg-dark);}
  .header img{ width:100%; max-width:200px; height:auto; display:inline-block; position:relative; z-index:1; }
  .tagline{font-family:'Baloo 2',sans-serif; color:var(--white); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-top:8px; position:relative; z-index:1;}
  .body{padding:28px 24px;}
  label{display:flex; align-items:center; gap:6px; font-weight:600; color:var(--navy); font-size:13px; margin-bottom:8px; letter-spacing:.3px;}
  .icon{width:18px; height:18px; flex-shrink:0;}
  .icon.spin{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  input{width:100%; padding:16px 16px; border-radius:16px; border:2px solid #e3d6b8;
        font-family:'Quicksand',sans-serif; font-size:16px; margin-bottom:18px; background:var(--white);
        transition:border-color .2s, box-shadow .2s; -webkit-appearance:none;}
  input:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 4px rgba(211,162,74,.18);}
  input::placeholder{color:#c4b69a;}
  button{width:100%; padding:16px; border:none; border-radius:16px; background:linear-gradient(135deg,var(--navy),#243b5e);
         color:var(--white); font-family:'Baloo 2',sans-serif; font-weight:700; font-size:17px;
         cursor:pointer; transition:transform .15s, box-shadow .2s; touch-action:manipulation;
         box-shadow:0 4px 12px rgba(30,52,80,.3); position:relative; overflow:hidden;
         display:flex; align-items:center; justify-content:center; gap:8px;}
  button:active{transform:scale(.97); box-shadow:0 2px 6px rgba(30,52,80,.2);}
  button:disabled{opacity:.5; transform:none;}
  .msg{margin-top:16px; text-align:center; font-size:14px; font-weight:600; line-height:1.5;
       display:flex; align-items:center; justify-content:center; gap:8px;}
  .msg.ok{color:#2f7a4f;} .msg.error{color:#b1442f;}
  .msg a{color:var(--navy);}
  .links{text-align:center; margin-top:20px; display:flex; flex-direction:column; gap:10px;}
  .links a{color:#8a7a5c; text-decoration:none; font-weight:600; font-size:14px; padding:6px 0;
           transition:color .2s; touch-action:manipulation;
           display:inline-flex; align-items:center; justify-content:center; gap:6px;}
  .links a:hover{color:var(--navy);}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <img src="img/logo.png" alt="Take Away Coffee & Drinks">
    <div class="tagline">Fidelidad · Café & Drinks</div>
  </div>
  <div class="body">
    <form id="form">
      <label for="telefono"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Tu número de teléfono</label>
      <input id="telefono" required placeholder="300 123 4567" inputmode="numeric" autocomplete="tel">
      <button type="submit" id="btn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Ver mi tarjeta</button>
    </form>
    <div id="msg"></div>
    <div class="links">
      <a href="registro.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> ¿Sin tarjeta? Crear una</a>
      <a href="admin.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Acceso cajero</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
  const form = document.getElementById('form');
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');

  const BTN_BUSCAR = `${ICONOS.buscar} Ver mi tarjeta`;
  const BTN_BUSCANDO = `${ICONOS.spinner} Buscando…`;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const telefono = document.getElementById('telefono').value.trim();
    if(!telefono) return;
    btn.disabled = true; btn.innerHTML = BTN_BUSCANDO;
    msg.textContent = '';

    try{
      const res = await fetch(`${API_URL}?accion=consultar&telefono=${encodeURIComponent(telefono)}`);
      const data = await res.json();

      if(data.error){
        msg.innerHTML = `<div class="msg error">${ICONOS.error} No encontramos ese número.<br><a href="registro.html">Regístrate aquí</a></div>`;
      } else {
        window.location.href = `tarjeta.html?tel=${telefono}`;
      }
    }catch(err){
      msg.innerHTML = `<div class="msg error">${ICONOS.alerta} No se pudo conectar. Intenta de nuevo.</div>`;
    }finally{
      btn.disabled = false; btn.innerHTML = BTN_BUSCAR;
    }
  });
</script>
</body>
</html>
